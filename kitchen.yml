driver:
  name: vagrant

provisioner:
  name: chef_infra
  product_name: cinc
  install_strategy: skip
  enforce_idempotency: true
  multiple_converge: 2
  deprecations_as_errors: true

verifier:
  name: inspec

platforms:
  - name: centos-7
  - name: oraclelinux-7

suites:
  - name: default
    run_list:
      - recipe[test_yum_ius::default]
  - name: enable-all
    run_list:
      - recipe[test_yum_ius::enable_all]
